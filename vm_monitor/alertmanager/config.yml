global:
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "${ALERT_EMAIL_FROM}"
  smtp_auth_username: "${ALERT_EMAIL_FROM}"
  smtp_auth_password: "${ALERT_EMAIL_PASSWORD}"
  smtp_require_tls: true

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: email-default
  routes:
    - match:
        severity: critical
      receiver: email-critical
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: email-warning
      repeat_interval: 4h

receivers:
  - name: email-default
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        send_resolved: true

  - name: email-critical
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        send_resolved: true
        headers:
          Subject: "CRITICAL: {{ .GroupLabels.alertname }}"

  - name: email-warning
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        send_resolved: true
        headers:
          Subject: "WARNING: {{ .GroupLabels.alertname }}"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]
